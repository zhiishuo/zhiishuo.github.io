<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zhishuo Album | 个人相册</title>
    <meta
      name="description"
      content="Zhishuo Zhao personal album, organized chronologically as a visual record of places and experiences."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="shell hero">
      <a class="back-link" href="../">← Back to homepage</a>
      <p class="eyebrow">Zhishuo Album</p>
      <h1>个人相册</h1>
      <p class="intro">按时间顺序整理的一组个人照片，记录不同阶段的地点、状态和经历。</p>
    </header>

    <main class="shell album-layout">
      <aside class="album-sidebar">
        <p class="sidebar-title">时间线</p>
        <div id="monthNav" class="month-nav"></div>
      </aside>

      <section class="album-main">
        <div class="album-meta">
          <p class="meta-line"><span id="photoCount">0</span> photos</p>
          <p class="meta-line">Chronological archive</p>
        </div>
        <div id="albumGroups" class="album-groups"></div>
      </section>
    </main>

    <dialog id="lightbox" class="lightbox">
      <form method="dialog" class="lightbox-close-wrap">
        <button class="lightbox-close" aria-label="Close">×</button>
      </form>
      <img id="lightboxImage" alt="" />
      <div class="lightbox-meta">
        <p id="lightboxDate"></p>
        <p id="lightboxName"></p>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
