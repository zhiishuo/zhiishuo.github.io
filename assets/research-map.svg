  <text x="84" y="123" fill="#5D6472" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">INPUT SIGNALS</text>
  <text x="84" y="160" fill="#191B20" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Speech</text>
  <text x="194" y="160" fill="#191B20" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Vision</text>
  <text x="84" y="190" fill="#191B20" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Text</text>

  <text x="364" y="123" fill="#5D6472" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">PERCEPTION</text>
  <text x="364" y="160" fill="#1F4FD1" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Robust AVSR</text>
  <text x="364" y="190" fill="#2C3442" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500">noise, alignment, weak-signal repair</text>

  <text x="664" y="123" fill="#5D6472" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">REASONING</text>
  <text x="664" y="160" fill="#6244B5" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Emotion Understanding</text>
  <text x="664" y="190" fill="#2C3442" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500">conflict, uncertainty, selective repair</text>

  <text x="984" y="123" fill="#5D6472" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">ACTION</text>
  <text x="984" y="160" fill="#2B7A74" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Affective Agents</text>
  <text x="984" y="190" fill="#2C3442" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500">clarify, intervene, abstain</text>

