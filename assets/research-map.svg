  <text x="154" y="330" fill="#1A1D22" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Research thesis</text>
  <text x="154" y="370" fill="#2B3442" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">How can multimodal systems stay reliable when evidence is degraded, conflicted, or uncertain?</text>
  <text x="154" y="408" fill="#66707E" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500">A compact map from perception to reasoning to agentic intervention.</text>
